name: Upstream Sync

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/keleus/BewlyCat.git || true
          git fetch origin
          git fetch upstream

      - name: Create sync branch
        id: sync
        run: |
          BRANCH="bot/upstream-sync-$(date +%Y%m%d)"
          git checkout -B "$BRANCH" origin/main
          if git rebase upstream/main; then
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "conflict=false" >> $GITHUB_OUTPUT
          else
            git rebase --abort
            echo "conflict=true" >> $GITHUB_OUTPUT
            exit 0
          fi

      - name: Install dependencies
        if: steps.sync.outputs.conflict == 'false'
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Run CI checks
        if: steps.sync.outputs.conflict == 'false'
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build-safari
          pnpm validate-safari

      - name: Create pull request
        if: steps.sync.outputs.conflict == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ steps.sync.outputs.branch }}
          title: 'sync: rebase onto upstream/main'
          body: |
            Automated sync from `keleus/BewlyCat`.

            Before merging, verify:
            - Safari patch queue remains small and focused
            - `pnpm build-safari && pnpm validate-safari` passes
            - MAIN world, background, network, storage smoke tests pass
          commit-message: 'sync: rebase onto upstream/main'

      - name: Create issue on conflict
        if: steps.sync.outputs.conflict == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'sync: upstream rebase conflict'
          content-filepath: .github/upstream-sync-conflict-template.md
          labels: upstream-sync
