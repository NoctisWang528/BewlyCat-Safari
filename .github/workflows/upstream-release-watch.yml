name: Watch Upstream Releases

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

concurrency:
  group: upstream-release-watch
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch latest stable upstream release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote add upstream https://github.com/keleus/BewlyCat.git || true
          git fetch origin refs/heads/main:refs/remotes/origin/main

          RELEASE_TAG=$(gh api repos/keleus/BewlyCat/releases/latest --jq '.tag_name')
          if ! git check-ref-format "refs/tags/$RELEASE_TAG"; then
            echo "ERROR: invalid upstream release tag: $RELEASE_TAG"
            exit 1
          fi

          RELEASE_REF="refs/upstream-releases/$RELEASE_TAG"
          git fetch --no-tags upstream "+refs/tags/$RELEASE_TAG:$RELEASE_REF"
          RELEASE_COMMIT=$(git rev-parse "$RELEASE_REF^{commit}")

          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "commit=$RELEASE_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Check whether the release needs syncing
        id: check
        env:
          RELEASE_COMMIT: ${{ steps.release.outputs.commit }}
        run: |
          if git merge-base --is-ancestor "$RELEASE_COMMIT" origin/main; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.release.outputs.tag }} is already included in origin/main."
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger release sync
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          jq -n \
            --arg tag "$RELEASE_TAG" \
            '{event_type: "upstream-release", client_payload: {tag: $tag}}' \
            > "$RUNNER_TEMP/upstream-release-dispatch.json"

          gh api \
            --method POST \
            "repos/${{ github.repository }}/dispatches" \
            --input "$RUNNER_TEMP/upstream-release-dispatch.json"

          echo "Triggered upstream release sync for $RELEASE_TAG."
