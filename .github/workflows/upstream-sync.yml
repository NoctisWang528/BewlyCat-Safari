name: Upstream Sync

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: upstream-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/keleus/BewlyCat.git || true
          git remote set-url --push upstream DISABLED
          git fetch origin
          git fetch upstream

      - name: Check if sync is needed
        id: check
        run: |
          if git merge-base --is-ancestor upstream/main origin/main; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream into temporary branch
        if: steps.check.outputs.up_to_date == 'false'
        id: merge
        run: |
          TEMP_BRANCH="bot/upstream-sync-$(date +%Y%m%d-%H%M%S)"
          ORIGIN_MAIN_SHA=$(git rev-parse origin/main)
          echo "origin_main_sha=$ORIGIN_MAIN_SHA" >> $GITHUB_OUTPUT
          echo "branch=$TEMP_BRANCH" >> $GITHUB_OUTPUT

          git checkout -B "$TEMP_BRANCH" origin/main

          if ! git merge --no-ff -m "sync: merge upstream/main" upstream/main; then
            echo "## Upstream Sync Conflict" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following files have merge conflicts:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git diff --name-only --diff-filter=U >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git merge --abort
            echo "conflict=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "conflict=false" >> $GITHUB_OUTPUT

      - name: Install dependencies
        if: steps.merge.outputs.conflict != 'true' && steps.check.outputs.up_to_date == 'false'
        run: |
          # Clear write credentials during install
          git config --unset-all credential.helper || true
          pnpm install --frozen-lockfile

      - name: Run Safari CI
        if: steps.merge.outputs.conflict != 'true' && steps.check.outputs.up_to_date == 'false'
        run: |
          pnpm lint
          pnpm typecheck
          pnpm knip
          pnpm test
          pnpm build
          pnpm validate-safari

      - name: Push to origin/main
        if: steps.merge.outputs.conflict != 'true' && steps.check.outputs.up_to_date == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Re-fetch origin to verify main hasn't changed
          git fetch origin refs/heads/main:refs/remotes/origin/main
          CURRENT_MAIN=$(git rev-parse origin/main)
          EXPECTED_MAIN="${{ steps.merge.outputs.origin_main_sha }}"

          if [ "$CURRENT_MAIN" != "$EXPECTED_MAIN" ]; then
            echo "ERROR: origin/main changed during sync (was $EXPECTED_MAIN, now $CURRENT_MAIN). Aborting push."
            exit 1
          fi

          # Push using token
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          SYNC_BRANCH="${{ steps.merge.outputs.branch }}"
          git checkout "$SYNC_BRANCH"
          git push origin HEAD:main

      - name: Report conflict
        if: steps.merge.outputs.conflict == 'true'
        run: |
          echo "::error::Upstream sync encountered merge conflicts. See step summary for details."
          exit 1
