name: Upstream Release Sync

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Upstream release tag to merge (leave empty for the latest stable release)
        required: false
        type: string
  repository_dispatch:
    types:
      - upstream-release

concurrency:
  group: upstream-release-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch origin
        run: |
          git remote add upstream https://github.com/keleus/BewlyCat.git || true
          git remote set-url --push upstream DISABLED
          git fetch origin

      - name: Resolve upstream release
        id: release
        env:
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_TAG: ${{ inputs.release_tag }}
        run: |
          RELEASE_TAG="${DISPATCH_TAG:-$MANUAL_TAG}"
          if [ -z "$RELEASE_TAG" ]; then
            RELEASE_TAG=$(gh api repos/keleus/BewlyCat/releases/latest --jq '.tag_name')
          fi

          if ! git check-ref-format "refs/tags/$RELEASE_TAG"; then
            echo "ERROR: invalid upstream release tag: $RELEASE_TAG"
            exit 1
          fi

          RELEASE_REF="refs/upstream-releases/$RELEASE_TAG"
          git fetch --no-tags upstream "+refs/tags/$RELEASE_TAG:$RELEASE_REF"
          RELEASE_COMMIT=$(git rev-parse "$RELEASE_REF^{commit}")

          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "ref=$RELEASE_REF" >> "$GITHUB_OUTPUT"
          echo "commit=$RELEASE_COMMIT" >> "$GITHUB_OUTPUT"
          echo "Selected upstream release: $RELEASE_TAG ($RELEASE_COMMIT)"

      - name: Check if release is already merged
        id: check
        env:
          RELEASE_COMMIT: ${{ steps.release.outputs.commit }}
        run: |
          if git merge-base --is-ancestor "$RELEASE_COMMIT" origin/main; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.release.outputs.tag }} is already included in origin/main."
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream release into temporary branch
        if: steps.check.outputs.up_to_date == 'false'
        id: merge
        env:
          RELEASE_COMMIT: ${{ steps.release.outputs.commit }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          SAFE_TAG=$(printf '%s' "$RELEASE_TAG" | tr -c 'A-Za-z0-9._-' '-')
          TEMP_BRANCH="bot/upstream-release-${SAFE_TAG}-$(date +%Y%m%d-%H%M%S)"
          ORIGIN_MAIN_SHA=$(git rev-parse origin/main)
          echo "origin_main_sha=$ORIGIN_MAIN_SHA" >> "$GITHUB_OUTPUT"
          echo "branch=$TEMP_BRANCH" >> "$GITHUB_OUTPUT"

          git checkout -B "$TEMP_BRANCH" origin/main

          if ! git merge --no-ff -m "sync: merge upstream release $RELEASE_TAG" "$RELEASE_COMMIT"; then
            echo "## Upstream Release Sync Conflict" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Release: \`$RELEASE_TAG\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The following files have merge conflicts:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            git diff --name-only --diff-filter=U >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            git merge --abort
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "conflict=false" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.merge.outputs.conflict != 'true' && steps.check.outputs.up_to_date == 'false'
        run: |
          git config --unset-all credential.helper || true
          pnpm install --frozen-lockfile

      - name: Run Safari CI
        if: steps.merge.outputs.conflict != 'true' && steps.check.outputs.up_to_date == 'false'
        run: |
          pnpm lint
          pnpm typecheck
          pnpm knip
          pnpm test
          pnpm build
          pnpm validate-safari

      - name: Push to origin/main
        if: steps.merge.outputs.conflict != 'true' && steps.check.outputs.up_to_date == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin refs/heads/main:refs/remotes/origin/main
          CURRENT_MAIN=$(git rev-parse origin/main)
          EXPECTED_MAIN="${{ steps.merge.outputs.origin_main_sha }}"

          if [ "$CURRENT_MAIN" != "$EXPECTED_MAIN" ]; then
            echo "ERROR: origin/main changed during sync (was $EXPECTED_MAIN, now $CURRENT_MAIN). Aborting push."
            exit 1
          fi

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          SYNC_BRANCH="${{ steps.merge.outputs.branch }}"
          git checkout "$SYNC_BRANCH"
          git push origin HEAD:main

      - name: Report conflict
        if: steps.merge.outputs.conflict == 'true'
        run: |
          echo "::error::Upstream release sync encountered merge conflicts. See step summary for details."
          exit 1
